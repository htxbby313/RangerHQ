version: '3.9'

services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_BIND=0.0.0.0
      - NODE_ENV=production
    volumes:
      - ./openclaw.json:/app/openclaw.json
      - ./agents:/app/agents
      - ./flows:/app/flows
      - ./plugins:/app/plugins
      - ./plugin-skills:/app/plugin-skills
      - ./sandboxes:/app/sandboxes
      - ./tasks:/app/tasks
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "wget", "-O-", "http://localhost:18789"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  openclaw-net:
    driver: bridge
